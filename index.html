<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sput.ai - AI Challenge</title>
<style>
       body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; touch-action: none; overscroll-behavior: none; }
       .container { text-align: center; border: 2px solid #0f0; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 0 15px #0f0; }
       input { background: #111; color: #fff; border: 1px solid #0f0; padding: 10px; width: 60px; text-align: center; }
       button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
       .form-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
</style>
</head>
<body>
<div class="container">
<h1>AI CHALLENGE</h1>
<p id="msg">AI tuttuğu 1-100 arası sayıyı tahmin et!</p>
<input type="number" id="guess" placeholder="?">
<button onclick="check()">TAHMİN ET</button>
<p>Deneme: <span id="tries">0</span></p>
<div class="form-section">
<p>Domaini satın almak için teklif ver:</p>
<form action="https://formspree.io/f/mqeyeddn" method="POST">
<input type="email" name="email" placeholder="Email" style="width: 80%;" required>
<textarea name="message" placeholder="Teklifin..." style="width: 80%;" required></textarea>
<button type="submit">GÖNDER</button>
</form>
</div>
</div>
<script>
       let target = Math.floor(Math.random() * 100) + 1;
       let tries = 0;
       function check() {
           let val = document.getElementById("guess").value;
           tries++;
           document.getElementById("tries").innerText = tries;
           if(val == target) { document.getElementById("msg").innerText = "Tebrikler! AI'yi yendin!"; alert("AI'yi " + tries + " denemede yendin!"); location.reload(); }
           else if(val < target) document.getElementById("msg").innerText = "Daha YÜKSEK bir sayı gir.";
           else document.getElementById("msg").innerText = "Daha DÜŞÜK bir sayı gir.";
       }
</script>
</body>
</html>
