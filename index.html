<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sput.ai</title>
<style>
       html, body { overflow: hidden; touch-action: none; background: #000; color: #0f0; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; font-family: monospace; }
       canvas { border: 2px solid #0f0; width: 300px; height: 300px; }
       .controls { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
       button { padding: 20px; font-weight: bold; background: #222; color: #0f0; border: 1px solid #0f0; cursor: pointer; }
       .form-section { margin-top: 20px; width: 300px; }
       input, textarea { width: 100%; padding: 5px; margin-bottom: 5px; background: #111; color: #fff; border: 1px solid #333; }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="game" width="300" height="300"></canvas>
<div class="controls">
<div></div><button onclick="setDir('UP')">UP</button><div></div>
<button onclick="setDir('LEFT')">LEFT</button><button onclick="setDir('DOWN')">DOWN</button><button onclick="setDir('RIGHT')">RIGHT</button>
</div>
<div class="form-section">
<form action="https://formspree.io/f/XXXXXX" method="POST">
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Offer" required></textarea>
<button type="submit" style="width:100%;">SEND</button>
</form>
</div>
<script>
       const canvas = document.getElementById("game");
       const ctx = canvas.getContext("2d");
       let box = 15, score = 0, d;
       let snake = [{x: 9*box, y:10*box}];
       let food = {x: 150, y: 150};
       function setDir(dir) { if(dir=='UP' && d!='DOWN') d='UP'; if(dir=='DOWN' && d!='UP') d='DOWN'; if(dir=='LEFT' && d!='RIGHT') d='LEFT'; if(dir=='RIGHT' && d!='LEFT') d='RIGHT'; }
       document.addEventListener("keydown", e => { if(e.keyCode==37) setDir('LEFT'); if(e.keyCode==38) setDir('UP'); if(e.keyCode==39) setDir('RIGHT'); if(e.keyCode==40) setDir('DOWN'); });
       function draw() {
           ctx.fillStyle = "black"; ctx.fillRect(0,0,300,300);
           ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box, box);
           for(let i=0; i<snake.length; i++) { ctx.fillStyle = (i==0) ? "#0f0" : "#050"; ctx.fillRect(snake[i].x, snake[i].y, box, box); }
           let head = {x: snake[0].x, y: snake[0].y};
           if(d=='LEFT') head.x -= box; if(d=='UP') head.y -= box; if(d=='RIGHT') head.x += box; if(d=='DOWN') head.y += box;
           if(head.x==food.x && head.y==food.y) { score++; document.getElementById('score').innerText="Score: "+score; food={x:Math.floor(Math.random()*19)*box, y:Math.floor(Math.random()*19)*box}; } else snake.pop();
           snake.unshift(head);
       }
       setInterval(draw, 150);
</script>
</body>
</html>
